<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #1f4d2e;
      --green-medium: #3d7a52;
      --green-tint: #e8f2ec;
      --purple-dark: #6b2d7a;
      --purple-tint: #f3eaf5;
      --pink-dark: #c23058;
      --pink-tint: #faeef2;
      --dark: #1a1a1a;
      --grey: #767676;
      --surface: #f7f5f2;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--surface);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .checklist-wrap {
      width: 100%;
      max-width: 640px;
    }

    .checklist {
      font-family: 'Lato', sans-serif;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .cl-header {
      padding: 1.5rem 1.75rem;
      color: var(--white);
    }

    .cl-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .cl-progress-wrap {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }

    .cl-progress-bar {
      height: 100%;
      background: var(--white);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .cl-progress-label {
      font-size: 0.8rem;
      margin-top: 0.4rem;
      opacity: 0.9;
    }

    .cl-body {
      padding: 1.25rem 1.75rem 1.75rem;
    }

    .cl-section {
      margin-bottom: 1.5rem;
    }

    .cl-section:last-child {
      margin-bottom: 0;
    }

    .cl-section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--grey);
      font-weight: 700;
      margin-bottom: 0.65rem;
      padding-bottom: 0.35rem;
      border-bottom: 2px solid var(--green-tint);
    }

    .cl-item {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.5rem 0;
      cursor: pointer;
    }

    .cl-item input[type="checkbox"] {
      margin-top: 0.15rem;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .cl-item label {
      font-size: 0.95rem;
      line-height: 1.45;
      cursor: pointer;
      flex: 1;
    }

    .cl-item.checked label {
      text-decoration: line-through;
      color: var(--grey);
    }

    .cl-complete {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      background: var(--green-tint);
      border-radius: 6px;
      text-align: center;
      font-weight: 700;
      color: var(--green-dark);
      display: none;
    }

    .cl-complete.visible {
      display: block;
    }

    .cl-error {
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 1.75rem;
      text-align: center;
    }

    .cl-error h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 0.75rem;
    }

    .cl-error p {
      font-size: 0.95rem;
      color: var(--grey);
      line-height: 1.5;
    }

    .cl-error a {
      color: var(--purple-dark);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="checklist-wrap" id="root"></div>

  <script>
    const DEFAULTS = {
      headerBg: '#1f4d2e',
      accentColor: '#1f4d2e',
      completionMessage: 'All done — great work!'
    };

    const DEMO_CONFIG = {
      id: 'submission-checklist',
      title: 'Submission Checklist',
      headerBg: '#1f4d2e',
      accentColor: '#6b2d7a',
      completionMessage: 'All done — great work!',
      sections: [
        {
          label: 'Before you submit',
          items: [
            'Read the brief and marking criteria',
            'Check word count and formatting requirements',
            'Run spell check and proofread'
          ]
        },
        {
          label: 'Files & upload',
          items: [
            'Export as PDF (unless otherwise specified)',
            'Name your file correctly (surname-firstname-assignment.pdf)',
            'Upload to the correct Brightspace folder'
          ]
        },
        {
          label: 'Final check',
          items: [
            'Confirm submission timestamp before the deadline',
            'Download your submission to verify it opens correctly'
          ]
        }
      ]
    };

    let data = null;

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function decodeBase64Url(str) {
      let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
      while (base64.length % 4) base64 += '=';
      return decodeURIComponent(escape(atob(base64)));
    }

    function encodeBase64Url(str) {
      return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    function slugify(str) {
      return String(str || 'checklist')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '') || 'checklist';
    }

    function uid(prefix) {
      return prefix + '-' + Math.random().toString(36).slice(2, 10);
    }

    function normalizeConfig(raw) {
      if (!raw || typeof raw !== 'object') return null;

      const id = raw.id || slugify(raw.title);
      const sections = Array.isArray(raw.sections) ? raw.sections : [];
      if (!raw.title || sections.length === 0) return null;

      return {
        id,
        title: raw.title,
        headerBg: raw.headerBg || DEFAULTS.headerBg,
        accentColor: raw.accentColor || DEFAULTS.accentColor,
        completionMessage: raw.completionMessage || DEFAULTS.completionMessage,
        sections: sections.map((section, sIdx) => {
          const label = section.label || section.l || 'Untitled section';
          const rawItems = section.items || [];
          return {
            id: section.id || 'sec-' + sIdx,
            label,
            items: rawItems.map((item, iIdx) => {
              if (typeof item === 'string') {
                return { id: id + '-s' + sIdx + '-i' + iIdx, text: item, checked: false };
              }
              return {
                id: item.id || id + '-s' + sIdx + '-i' + iIdx,
                text: item.text || item.t || '',
                checked: false
              };
            })
          };
        })
      };
    }

    function parseConfigFromUrl() {
      const params = new URLSearchParams(location.search);

      if (params.get('demo') === '1') {
        return normalizeConfig(DEMO_CONFIG);
      }

      const encoded = params.get('d');
      if (encoded) {
        try {
          return normalizeConfig(JSON.parse(decodeBase64Url(encoded)));
        } catch (e) {
          return null;
        }
      }

      return null;
    }

    function storageKey() {
      return 'gs-checklist-' + data.id;
    }

    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey()));
        if (!Array.isArray(saved)) return;
        saved.forEach((secItems, si) => {
          if (!Array.isArray(secItems)) return;
          secItems.forEach(savedItem => {
            const item = data.sections[si]?.items.find(i => i.id === savedItem.id);
            if (item) item.checked = !!savedItem.checked;
          });
        });
      } catch (e) {}
    }

    function saveProgress() {
      const payload = data.sections.map(s =>
        s.items.map(i => ({ id: i.id, checked: i.checked }))
      );
      localStorage.setItem(storageKey(), JSON.stringify(payload));
    }

    function renderError() {
      document.title = 'Checklist — missing configuration';
      document.getElementById('root').innerHTML =
        '<div class="cl-error">' +
          '<h1>No checklist configured</h1>' +
          '<p>This page needs a checklist URL generated by the builder.<br>' +
          'For local testing, open <a href="?demo=1">checklist.html?demo=1</a>.</p>' +
        '</div>';
    }

    function render() {
      const total = data.sections.reduce((n, s) => n + s.items.length, 0);
      const checked = data.sections.reduce((n, s) => n + s.items.filter(i => i.checked).length, 0);
      const pct = total === 0 ? 0 : Math.round((checked / total) * 100);
      const allDone = total > 0 && checked === total;

      document.title = data.title;

      let sectionsHTML = '';
      data.sections.forEach(section => {
        let itemsHTML = '';
        section.items.forEach(item => {
          const checkedClass = item.checked ? ' checked' : '';
          const checkedAttr = item.checked ? ' checked' : '';
          itemsHTML +=
            '<div class="cl-item' + checkedClass + '" data-item-id="' + escapeHtml(item.id) + '">' +
              '<input type="checkbox" id="item-' + escapeHtml(item.id) + '"' + checkedAttr + '>' +
              '<label for="item-' + escapeHtml(item.id) + '">' + escapeHtml(item.text || 'Untitled item') + '</label>' +
            '</div>';
        });
        sectionsHTML +=
          '<div class="cl-section">' +
            '<div class="cl-section-label">' + escapeHtml(section.label) + '</div>' +
            itemsHTML +
          '</div>';
      });

      document.getElementById('root').innerHTML =
        '<div class="checklist">' +
          '<div class="cl-header" style="background:' + escapeHtml(data.headerBg) + '">' +
            '<h1>' + escapeHtml(data.title) + '</h1>' +
            '<div class="cl-progress-wrap">' +
              '<div class="cl-progress-bar" style="width:' + pct + '%"></div>' +
            '</div>' +
            '<div class="cl-progress-label">' + checked + ' of ' + total + ' complete (' + pct + '%)</div>' +
          '</div>' +
          '<div class="cl-body">' +
            sectionsHTML +
            '<div class="cl-complete' + (allDone ? ' visible' : '') + '">' +
              escapeHtml(data.completionMessage) +
            '</div>' +
          '</div>' +
        '</div>';

      document.querySelectorAll('.cl-item input[type="checkbox"]').forEach(cb => {
        cb.style.accentColor = data.accentColor;
        cb.addEventListener('change', () => {
          const itemId = cb.closest('.cl-item').dataset.itemId;
          for (const sec of data.sections) {
            const item = sec.items.find(i => i.id === itemId);
            if (item) {
              item.checked = cb.checked;
              break;
            }
          }
          saveProgress();
          render();
        });
      });
    }

    function init() {
      data = parseConfigFromUrl();
      if (!data) {
        renderError();
        return;
      }
      loadProgress();
      render();
    }

    // Exposed for the builder (later): ChecklistViewer.encodeConfig(config)
    window.ChecklistViewer = {
      encodeConfig: function(config) {
        return encodeBase64Url(JSON.stringify(config));
      },
      buildUrl: function(baseUrl, config) {
        const url = new URL('checklist.html', baseUrl);
        url.searchParams.set('d', encodeBase64Url(JSON.stringify(config)));
        return url.href;
      }
    };

    init();
  </script>
</body>
</html>
