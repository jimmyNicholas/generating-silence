<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #1f4d2e;
      --green-medium: #3d7a52;
      --green-tint: #e8f2ec;
      --purple-dark: #6b2d7a;
      --purple-tint: #f3eaf5;
      --pink-dark: #c23058;
      --pink-tint: #faeef2;
      --dark: #1a1a1a;
      --grey: #767676;
      --surface: #f7f5f2;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--surface);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.25rem 1rem 2rem;
    }

    .page-wrap {
      width: 100%;
      max-width: 640px;
    }

    .checklist {
      font-family: 'Lato', sans-serif;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .cl-header {
      padding: 1.5rem 1.75rem;
      color: var(--white);
    }

    .cl-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .cl-header-title-input {
      display: block;
      width: 100%;
      font-family: inherit;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0 0 0.25rem;
      margin-bottom: 0.75rem;
      line-height: 1.3;
      cursor: text;
    }

    .cl-header-title-input:hover,
    .cl-header-title-input:focus {
      outline: none;
      border-bottom-color: rgba(255, 255, 255, 0.5);
    }

    .cl-header-title-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .cl-header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .cl-color-label {
      font-size: 0.8rem;
      opacity: 0.9;
    }

    .cl-color-input {
      width: 36px;
      height: 28px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
    }

    .cl-progress-wrap {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }

    .cl-progress-bar {
      height: 100%;
      background: var(--white);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .cl-progress-label {
      font-size: 0.8rem;
      margin-top: 0.4rem;
      opacity: 0.9;
    }

    .cl-body {
      padding: 1.25rem 1.75rem 1.75rem;
    }

    @media (max-width: 420px) {
      .cl-header { padding: 1.25rem 1rem; }
      .cl-body { padding: 1rem 1rem 1.25rem; }
      .cl-header h1,
      .cl-header-title-input { font-size: 1.25rem; }
    }

    .cl-section {
      margin-bottom: 1.5rem;
    }

    .cl-section:last-child {
      margin-bottom: 0;
    }

    .cl-section-head {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.65rem;
      padding-bottom: 0.35rem;
      border-bottom: 2px solid var(--green-tint);
    }

    .cl-section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--grey);
      font-weight: 700;
      flex: 1;
      min-width: 0;
    }

    .cl-section-label-input {
      flex: 1;
      min-width: 0;
      font-family: inherit;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--grey);
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 1px dashed transparent;
      padding: 0.15rem 0;
      cursor: text;
    }

    .cl-section-label-input:hover,
    .cl-section-label-input:focus {
      outline: none;
      border-bottom-color: var(--grey);
    }

    .cl-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem 0;
    }

    .cl-item.view-mode {
      cursor: pointer;
    }

    .cl-drag-handle {
      flex-shrink: 0;
      width: 18px;
      padding-top: 0.15rem;
      color: var(--grey);
      cursor: grab;
      opacity: 0.45;
      font-size: 0.85rem;
      line-height: 1;
      user-select: none;
      touch-action: none;
    }

    .cl-drag-handle:active {
      cursor: grabbing;
    }

    .cl-drag-handle:hover {
      opacity: 0.8;
    }

    .cl-item input[type="checkbox"] {
      margin-top: 0.15rem;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .cl-item-text {
      font-size: 0.95rem;
      line-height: 1.45;
      flex: 1;
      min-width: 0;
    }

    .cl-item-text-input {
      flex: 1;
      min-width: 0;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
      background: transparent;
      border: none;
      border-bottom: 1px dashed transparent;
      padding: 0;
      cursor: text;
      color: inherit;
    }

    .cl-item-text-input:hover,
    .cl-item-text-input:focus {
      outline: none;
      border-bottom-color: var(--grey);
    }

    .cl-item.checked .cl-item-text,
    .cl-item.checked .cl-item-text-input {
      text-decoration: line-through;
      color: var(--grey);
    }

    .cl-btn-icon {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--grey);
      cursor: pointer;
      font-family: inherit;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0.1rem 0.25rem;
      opacity: 0.45;
      border-radius: 3px;
    }

    .cl-btn-icon:hover {
      opacity: 1;
      color: var(--pink-dark);
      background: var(--pink-tint);
    }

    .cl-btn-text {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--green-medium);
      background: var(--green-tint);
      border: none;
      border-radius: 6px;
      padding: 0.5rem 0.85rem;
      cursor: pointer;
      margin-top: 0.35rem;
    }

    .cl-btn-text:hover {
      background: #d9ebe0;
    }

    .cl-add-section-wrap {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 2px solid var(--green-tint);
    }

    .cl-complete {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      background: var(--green-tint);
      border: 2px solid var(--green-dark);
      border-radius: 6px;
      text-align: center;
      font-weight: 700;
      color: var(--green-dark);
      display: none;
    }

    .cl-complete.visible {
      display: block;
    }

    .cl-section.drag-over .cl-section-head {
      background: var(--purple-tint);
      border-radius: 4px;
    }

    .cl-item.drag-over {
      background: var(--purple-tint);
      border-radius: 4px;
    }

    .cl-section.dragging {
      opacity: 0.5;
    }

    .cl-item.dragging {
      opacity: 0.5;
    }

    /* Embed panel */
    .embed-panel {
      margin-top: 1.5rem;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .embed-panel-header {
      background: var(--purple-dark);
      color: var(--white);
      padding: 1rem 1.25rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .embed-panel-body {
      padding: 1.25rem;
    }

    .embed-block {
      margin-bottom: 1.25rem;
    }

    .embed-block:last-child {
      margin-bottom: 0;
    }

    .embed-block label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--grey);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .embed-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .embed-code {
      display: block;
      width: 100%;
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
      font-size: 0.75rem;
      line-height: 1.5;
      background: var(--surface);
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.75rem;
      color: var(--dark);
      word-break: break-all;
      white-space: pre-wrap;
    }

    .embed-url {
      font-size: 0.8rem;
      word-break: break-all;
    }

    .embed-btn {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: var(--green-dark);
      color: var(--white);
    }

    .embed-btn:hover {
      background: var(--green-medium);
    }

    .embed-btn.secondary {
      background: var(--purple-tint);
      color: var(--purple-dark);
    }

    .embed-btn.secondary:hover {
      background: #e8d4ed;
    }

    .embed-height-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .embed-height-row input {
      font-family: inherit;
      font-size: 0.9rem;
      width: 5rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    .embed-height-row span {
      font-size: 0.85rem;
      color: var(--grey);
    }

    .copy-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: var(--white);
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 100;
    }

    .copy-toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="page-wrap" id="root"></div>
  <div class="copy-toast" id="copy-toast">Copied!</div>

  <script>
    const BASE_URL = 'https://YOUR_GITHUB_USERNAME.github.io/generating-silence-tools';

    const MAX_SECTIONS = 10;
    const MAX_ITEMS = 20;
    const COMPLETION_MESSAGE = 'All items complete. You are ready to submit.';

    const DEFAULT_DEMO = {
      title: 'Submission Checklist',
      color: '1f4d2e',
      sections: [
        {
          id: 'sec-1',
          label: 'Before you submit',
          items: [
            { id: 'i-1', text: 'Read the brief and marking criteria', checked: false },
            { id: 'i-2', text: 'Check word count and formatting requirements', checked: false },
            { id: 'i-3', text: 'Run spell check and proofread', checked: false }
          ]
        },
        {
          id: 'sec-2',
          label: 'Files & upload',
          items: [
            { id: 'i-4', text: 'Export as PDF (unless otherwise specified)', checked: false },
            { id: 'i-5', text: 'Name your file correctly (surname-firstname-assignment.pdf)', checked: false },
            { id: 'i-6', text: 'Upload to the correct Brightspace folder', checked: false }
          ]
        },
        {
          id: 'sec-3',
          label: 'Final check',
          items: [
            { id: 'i-7', text: 'Confirm submission timestamp before the deadline', checked: false },
            { id: 'i-8', text: 'Download your submission to verify it opens correctly', checked: false }
          ]
        }
      ]
    };

    let state = null;
    let editMode = false;
    let iframeHeight = 500;
    let dragContext = null;

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function uid(prefix) {
      return prefix + '-' + Math.random().toString(36).slice(2, 10);
    }

    function normalizeColor(color) {
      const c = String(color || '1f4d2e').replace(/^#/, '').toLowerCase();
      return /^[0-9a-f]{6}$/.test(c) ? c : '1f4d2e';
    }

    function headerHex() {
      return '#' + state.color;
    }

    function getEffectiveBaseUrl() {
      if (!BASE_URL.includes('YOUR_GITHUB_USERNAME')) {
        return BASE_URL.replace(/\/$/, '');
      }
      const path = location.pathname.replace(/\/[^/]*$/, '');
      return location.origin + path;
    }

    function parseFromUrl() {
      const params = new URLSearchParams(location.search);
      const keys = [...params.keys()];

      if (keys.length === 0) {
        return { data: cloneData(DEFAULT_DEMO), editMode: true };
      }

      const title = params.get('title') || 'Untitled Checklist';
      const color = normalizeColor(params.get('color'));
      const edit = params.get('edit') === 'true';

      const sections = [];
      for (let s = 1; s <= MAX_SECTIONS; s++) {
        const label = params.get('s' + s);
        if (label === null) break;
        const items = [];
        for (let i = 1; i <= MAX_ITEMS; i++) {
          const text = params.get('s' + s + 'i' + i);
          if (text === null) break;
          items.push({ id: uid('i'), text, checked: false });
        }
        sections.push({ id: uid('sec'), label, items });
      }

      if (sections.length === 0) {
        return { data: { title, color, sections: [] }, editMode: edit };
      }

      return { data: { title, color, sections }, editMode: edit };
    }

    function cloneData(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function buildQueryString(forView) {
      const params = new URLSearchParams();
      params.set('title', state.title);
      params.set('color', state.color);
      params.set('edit', forView ? 'false' : 'true');

      state.sections.forEach((section, si) => {
        const sn = si + 1;
        params.set('s' + sn, section.label);
        section.items.forEach((item, ii) => {
          params.set('s' + sn + 'i' + (ii + 1), item.text);
        });
      });

      return params.toString();
    }

    function buildViewUrl() {
      const params = new URLSearchParams();
      params.set('title', state.title);
      params.set('color', state.color);
      params.set('edit', 'false');

      state.sections.forEach((section, si) => {
        const sn = si + 1;
        params.set('s' + sn, section.label);
        section.items.forEach((item, ii) => {
          params.set('s' + sn + 'i' + (ii + 1), item.text);
        });
      });

      return getEffectiveBaseUrl() + '/checklist.html?' + params.toString();
    }

    function storageKey() {
      return 'gs-checklist-' + buildQueryString(true);
    }

    function loadProgress() {
      if (editMode) return;
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey()));
        if (!Array.isArray(saved)) return;
        saved.forEach((secItems, si) => {
          if (!Array.isArray(secItems)) return;
          secItems.forEach((savedItem, ii) => {
            const item = state.sections[si]?.items[ii];
            if (item) item.checked = !!savedItem.checked;
          });
        });
      } catch (e) {}
    }

    function saveProgress() {
      if (editMode) return;
      const payload = state.sections.map(s =>
        s.items.map(i => ({ checked: i.checked }))
      );
      localStorage.setItem(storageKey(), JSON.stringify(payload));
    }

    function counts() {
      const total = state.sections.reduce((n, s) => n + s.items.length, 0);
      const checked = state.sections.reduce(
        (n, s) => n + s.items.filter(i => i.checked).length,
        0
      );
      const pct = total === 0 ? 0 : Math.round((checked / total) * 100);
      return { total, checked, pct, allDone: total > 0 && checked === total };
    }

    function renderHeader() {
      const { total, checked, pct } = counts();
      const bg = headerHex();

      if (editMode) {
        return (
          '<div class="cl-header" id="cl-header" style="background:' + escapeHtml(bg) + '">' +
            '<input type="text" class="cl-header-title-input" id="title-input" value="' +
              escapeHtml(state.title) + '" placeholder="Checklist title" aria-label="Checklist title">' +
            '<div class="cl-header-controls">' +
              '<span class="cl-color-label">Header colour</span>' +
              '<input type="color" class="cl-color-input" id="color-input" value="' +
                escapeHtml(bg) + '" aria-label="Header colour">' +
            '</div>' +
            '<div class="cl-progress-wrap">' +
              '<div class="cl-progress-bar" id="progress-bar" style="width:' + pct + '%"></div>' +
            '</div>' +
            '<div class="cl-progress-label" id="progress-label">' +
              checked + ' of ' + total + ' complete' +
            '</div>' +
          '</div>'
        );
      }

      return (
        '<div class="cl-header" id="cl-header" style="background:' + escapeHtml(bg) + '">' +
          '<h1>' + escapeHtml(state.title) + '</h1>' +
          '<div class="cl-progress-wrap">' +
            '<div class="cl-progress-bar" id="progress-bar" style="width:' + pct + '%"></div>' +
          '</div>' +
          '<div class="cl-progress-label" id="progress-label">' +
            checked + ' of ' + total + ' complete' +
          '</div>' +
        '</div>'
      );
    }

    function renderItem(sectionIndex, item, itemIndex) {
      const checkedClass = item.checked ? ' checked' : '';
      const checkedAttr = item.checked ? ' checked' : '';
      const viewClass = editMode ? '' : ' view-mode';

      if (editMode) {
        return (
          '<div class="cl-item' + checkedClass + viewClass + '" data-si="' + sectionIndex +
            '" data-ii="' + itemIndex + '">' +
            '<span class="cl-drag-handle" draggable="false" title="Drag to reorder" aria-hidden="true">⠿</span>' +
            '<input type="checkbox" id="item-' + sectionIndex + '-' + itemIndex + '"' + checkedAttr +
              ' aria-label="Mark item complete">' +
            '<input type="text" class="cl-item-text-input" value="' + escapeHtml(item.text) +
              '" placeholder="Item text" aria-label="Item text">' +
            '<button type="button" class="cl-btn-icon cl-delete-item" title="Delete item" aria-label="Delete item">×</button>' +
          '</div>'
        );
      }

      return (
        '<div class="cl-item' + checkedClass + viewClass + '" data-si="' + sectionIndex +
          '" data-ii="' + itemIndex + '">' +
          '<input type="checkbox" id="item-' + sectionIndex + '-' + itemIndex + '"' + checkedAttr +
            ' aria-label="Mark item complete">' +
          '<label class="cl-item-text" for="item-' + sectionIndex + '-' + itemIndex + '">' +
            escapeHtml(item.text || 'Untitled item') +
          '</label>' +
        '</div>'
      );
    }

    function renderSection(section, sectionIndex) {
      let itemsHTML = '';
      section.items.forEach((item, ii) => {
        itemsHTML += renderItem(sectionIndex, item, ii);
      });

      const addItemBtn = editMode && section.items.length < MAX_ITEMS
        ? '<button type="button" class="cl-btn-text cl-add-item" data-si="' + sectionIndex +
            '">+ Add item</button>'
        : '';

      const sectionHead = editMode
        ? (
          '<div class="cl-section-head">' +
            '<span class="cl-drag-handle cl-section-drag" draggable="false" title="Drag to reorder section" aria-hidden="true">⠿</span>' +
            '<input type="text" class="cl-section-label-input" value="' + escapeHtml(section.label) +
              '" placeholder="Section label" aria-label="Section label">' +
            '<button type="button" class="cl-btn-icon cl-delete-section" title="Delete section" aria-label="Delete section">×</button>' +
          '</div>'
        )
        : (
          '<div class="cl-section-head">' +
            '<div class="cl-section-label">' + escapeHtml(section.label || 'Untitled section') + '</div>' +
          '</div>'
        );

      return (
        '<div class="cl-section" data-si="' + sectionIndex + '">' +
          sectionHead +
          itemsHTML +
          addItemBtn +
        '</div>'
      );
    }

    function renderChecklistBody() {
      const { allDone } = counts();
      let sectionsHTML = '';
      state.sections.forEach((section, si) => {
        sectionsHTML += renderSection(section, si);
      });

      const addSectionBtn = editMode && state.sections.length < MAX_SECTIONS
        ? (
          '<div class="cl-add-section-wrap">' +
            '<button type="button" class="cl-btn-text" id="add-section-btn">+ Add section</button>' +
          '</div>'
        )
        : '';

      return (
        '<div class="checklist">' +
          renderHeader() +
          '<div class="cl-body">' +
            sectionsHTML +
            addSectionBtn +
            '<div class="cl-complete' + (allDone ? ' visible' : '') + '" id="complete-msg">' +
              escapeHtml(COMPLETION_MESSAGE) +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }

    function renderEmbedPanel() {
      const viewUrl = buildViewUrl();
      const iframeCode =
        '<iframe\n' +
        '  src="' + viewUrl + '"\n' +
        '  width="100%"\n' +
        '  height="' + iframeHeight + '"\n' +
        '  frameborder="0"\n' +
        '  allowfullscreen>\n' +
        '</iframe>';

      return (
        '<div class="embed-panel">' +
          '<div class="embed-panel-header">Embed code</div>' +
          '<div class="embed-panel-body">' +
            '<div class="embed-block">' +
              '<label>Student view URL</label>' +
              '<code class="embed-code embed-url" id="embed-url">' + escapeHtml(viewUrl) + '</code>' +
              '<div class="embed-row">' +
                '<button type="button" class="embed-btn" id="open-preview-btn">Open preview</button>' +
                '<button type="button" class="embed-btn secondary" id="copy-url-btn">Copy URL</button>' +
              '</div>' +
            '</div>' +
            '<div class="embed-block">' +
              '<label>Brightspace iframe embed</label>' +
              '<div class="embed-height-row">' +
                '<span>Height</span>' +
                '<input type="number" id="iframe-height" min="200" max="2000" value="' + iframeHeight + '">' +
                '<span>px</span>' +
              '</div>' +
              '<code class="embed-code" id="embed-iframe-code">' + escapeHtml(iframeCode) + '</code>' +
              '<div class="embed-row">' +
                '<button type="button" class="embed-btn secondary" id="copy-embed-btn">Copy embed code</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }

    function updateProgressUI() {
      const { total, checked, pct, allDone } = counts();
      const bar = document.getElementById('progress-bar');
      const label = document.getElementById('progress-label');
      const complete = document.getElementById('complete-msg');
      if (bar) bar.style.width = pct + '%';
      if (label) label.textContent = checked + ' of ' + total + ' complete';
      if (complete) complete.classList.toggle('visible', allDone);
    }

    function updateEmbedPanelLive() {
      if (!editMode) return;
      const viewUrl = buildViewUrl();
      const urlEl = document.getElementById('embed-url');
      const codeEl = document.getElementById('embed-iframe-code');
      if (urlEl) urlEl.textContent = viewUrl;
      if (codeEl) {
        codeEl.textContent =
          '<iframe\n' +
          '  src="' + viewUrl + '"\n' +
          '  width="100%"\n' +
          '  height="' + iframeHeight + '"\n' +
          '  frameborder="0"\n' +
          '  allowfullscreen>\n' +
          '</iframe>';
      }
    }

    function applyAccentColors() {
      const hex = headerHex();
      document.querySelectorAll('.cl-item input[type="checkbox"]').forEach(cb => {
        cb.style.accentColor = hex;
      });
    }

    function showToast() {
      const toast = document.getElementById('copy-toast');
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 1800);
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showToast).catch(fallbackCopy);
      } else {
        fallbackCopy();
      }

      function fallbackCopy() {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          showToast();
        } catch (e) {}
        document.body.removeChild(ta);
      }
    }

    function attachViewListeners() {
      document.querySelectorAll('.cl-item.view-mode').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.type === 'checkbox') return;
          const cb = row.querySelector('input[type="checkbox"]');
          if (cb) {
            cb.checked = !cb.checked;
            cb.dispatchEvent(new Event('change'));
          }
        });
      });

      document.querySelectorAll('.cl-item input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          const row = cb.closest('.cl-item');
          const si = parseInt(row.dataset.si, 10);
          const ii = parseInt(row.dataset.ii, 10);
          state.sections[si].items[ii].checked = cb.checked;
          row.classList.toggle('checked', cb.checked);
          saveProgress();
          updateProgressUI();
        });
      });
    }

    function attachEditListeners() {
      const titleInput = document.getElementById('title-input');
      if (titleInput) {
        titleInput.addEventListener('input', () => {
          state.title = titleInput.value;
          document.title = state.title || 'Checklist';
          updateEmbedPanelLive();
        });
      }

      const colorInput = document.getElementById('color-input');
      if (colorInput) {
        colorInput.addEventListener('input', () => {
          state.color = normalizeColor(colorInput.value);
          const header = document.getElementById('cl-header');
          if (header) header.style.background = headerHex();
          applyAccentColors();
          updateEmbedPanelLive();
        });
      }

      document.querySelectorAll('.cl-section-label-input').forEach((input, si) => {
        input.addEventListener('input', () => {
          state.sections[si].label = input.value;
          updateEmbedPanelLive();
        });
      });

      document.querySelectorAll('.cl-item').forEach(row => {
        const si = parseInt(row.dataset.si, 10);
        const ii = parseInt(row.dataset.ii, 10);
        const textInput = row.querySelector('.cl-item-text-input');
        const cb = row.querySelector('input[type="checkbox"]');

        if (textInput) {
          textInput.addEventListener('input', () => {
            state.sections[si].items[ii].text = textInput.value;
            updateEmbedPanelLive();
          });
        }

        if (cb) {
          cb.addEventListener('change', () => {
            state.sections[si].items[ii].checked = cb.checked;
            row.classList.toggle('checked', cb.checked);
            updateProgressUI();
          });
        }

        const delBtn = row.querySelector('.cl-delete-item');
        if (delBtn) {
          delBtn.addEventListener('click', e => {
            e.stopPropagation();
            state.sections[si].items.splice(ii, 1);
            render();
          });
        }
      });

      document.querySelectorAll('.cl-add-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const si = parseInt(btn.dataset.si, 10);
          if (state.sections[si].items.length >= MAX_ITEMS) return;
          state.sections[si].items.push({ id: uid('i'), text: 'New item', checked: false });
          render();
        });
      });

      document.querySelectorAll('.cl-delete-section').forEach((btn, si) => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          if (state.sections.length <= 1) return;
          state.sections.splice(si, 1);
          render();
        });
      });

      const addSectionBtn = document.getElementById('add-section-btn');
      if (addSectionBtn) {
        addSectionBtn.addEventListener('click', () => {
          if (state.sections.length >= MAX_SECTIONS) return;
          state.sections.push({
            id: uid('sec'),
            label: 'New section',
            items: [{ id: uid('i'), text: 'New item', checked: false }]
          });
          render();
        });
      }

      attachDragAndDrop();

      const openBtn = document.getElementById('open-preview-btn');
      if (openBtn) {
        openBtn.addEventListener('click', () => {
          window.open(buildViewUrl(), '_blank', 'noopener');
        });
      }

      const copyUrlBtn = document.getElementById('copy-url-btn');
      if (copyUrlBtn) {
        copyUrlBtn.addEventListener('click', () => copyText(buildViewUrl()));
      }

      const copyEmbedBtn = document.getElementById('copy-embed-btn');
      if (copyEmbedBtn) {
        copyEmbedBtn.addEventListener('click', () => {
          const codeEl = document.getElementById('embed-iframe-code');
          copyText(codeEl ? codeEl.textContent : '');
        });
      }

      const heightInput = document.getElementById('iframe-height');
      if (heightInput) {
        heightInput.addEventListener('input', () => {
          const val = parseInt(heightInput.value, 10);
          iframeHeight = Number.isFinite(val) && val >= 200 ? val : 500;
          updateEmbedPanelLive();
        });
      }
    }

    function attachDragAndDrop() {
      document.querySelectorAll('.cl-section').forEach(sectionEl => {
        const si = parseInt(sectionEl.dataset.si, 10);
        const handle = sectionEl.querySelector('.cl-section-drag');

        if (handle) {
          handle.setAttribute('draggable', 'true');

          handle.addEventListener('dragstart', e => {
            dragContext = { type: 'section', fromSi: si };
            sectionEl.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', 'section');
            e.stopPropagation();
          });

          handle.addEventListener('dragend', () => {
            sectionEl.classList.remove('dragging');
            document.querySelectorAll('.cl-section.drag-over').forEach(el => el.classList.remove('drag-over'));
            dragContext = null;
          });
        }

        sectionEl.addEventListener('dragover', e => {
          if (dragContext && dragContext.type === 'section') {
            e.preventDefault();
            sectionEl.classList.add('drag-over');
          }
        });

        sectionEl.addEventListener('dragleave', e => {
          if (!sectionEl.contains(e.relatedTarget)) {
            sectionEl.classList.remove('drag-over');
          }
        });

        sectionEl.addEventListener('drop', e => {
          e.preventDefault();
          sectionEl.classList.remove('drag-over');
          if (!dragContext || dragContext.type !== 'section') return;
          const fromSi = dragContext.fromSi;
          const toSi = si;
          if (fromSi === toSi) return;
          const moved = state.sections.splice(fromSi, 1)[0];
          state.sections.splice(toSi, 0, moved);
          render();
        });
      });

      document.querySelectorAll('.cl-item .cl-drag-handle').forEach(handle => {
        const itemEl = handle.closest('.cl-item');
        const si = parseInt(itemEl.dataset.si, 10);
        const ii = parseInt(itemEl.dataset.ii, 10);

        handle.setAttribute('draggable', 'true');

        handle.addEventListener('dragstart', e => {
          dragContext = { type: 'item', fromSi: si, fromIi: ii };
          itemEl.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', 'item');
          e.stopPropagation();
        });

        handle.addEventListener('dragend', () => {
          itemEl.classList.remove('dragging');
          document.querySelectorAll('.cl-item.drag-over').forEach(el => el.classList.remove('drag-over'));
          dragContext = null;
        });

        itemEl.addEventListener('dragover', e => {
          if (dragContext && dragContext.type === 'item' && dragContext.fromSi === si) {
            e.preventDefault();
            e.stopPropagation();
            itemEl.classList.add('drag-over');
          }
        });

        itemEl.addEventListener('dragleave', e => {
          if (!itemEl.contains(e.relatedTarget)) {
            itemEl.classList.remove('drag-over');
          }
        });

        itemEl.addEventListener('drop', e => {
          e.preventDefault();
          e.stopPropagation();
          itemEl.classList.remove('drag-over');
          if (!dragContext || dragContext.type !== 'item') return;
          const { fromSi, fromIi } = dragContext;
          if (fromSi !== si || fromIi === ii) return;
          const items = state.sections[si].items;
          const moved = items.splice(fromIi, 1)[0];
          items.splice(toIi, 0, moved);
          render();
        });
      });
    }

    function render() {
      document.title = state.title || 'Checklist';

      let html = renderChecklistBody();
      if (editMode) html += renderEmbedPanel();

      document.getElementById('root').innerHTML = html;
      applyAccentColors();

      if (editMode) {
        attachEditListeners();
      } else {
        attachViewListeners();
      }
    }

    function init() {
      const parsed = parseFromUrl();
      state = parsed.data;
      editMode = parsed.editMode;
      loadProgress();
      render();
    }

    init();
  </script>
</body>
</html>
